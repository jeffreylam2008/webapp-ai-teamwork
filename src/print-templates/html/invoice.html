<div class="invoice-print-root">

  <div class="invoice-print-page">
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

    <!-- print header -->
    <table class="invoice-header-table" border="0" width="1100" height="170">
      <tbody>
        <tr>
          <td width="380"><font size="5"><b>{{customerName}}</b></font></td>
          <td width="180">&nbsp;</td>
          <td width="130"><font size="5"><b>{{invoiceDate}}</b></font></td>
          <td width="150">&nbsp;</td>
          <td width="150"><font size="5"><b>{{invoiceNum}}</b></font></td>
        </tr>
        <tr>
          <td><font size="5"><b>{{deliveryAddr}}</b></font></td>
          <td>&nbsp;</td>
          <td><font size="5"><b>{{quotation}}</b></font></td>
          <td>&nbsp;</td>
          <td><font size="5"><b>{{custCode}}</b></font></td>
        </tr>
        <tr>
          <td><font size="5"><b>&nbsp;</b></font></td>
          <td>&nbsp;</td>
          <td><font size="5"><b>{{employeeCode}}</b></font></td>
          <td>&nbsp;</td>
          <td><font size="5"><b>{{paymentMethod}}</b></font></td>
        </tr>
      </tbody>
    </table>

    -<br>-<br>-<br>-<br>

    <!-- print body -->
    <table class="invoice-body-table" border="0" width="1100" height="750">
      <tr valign="top">
        <td width="100%">
          {{#each items}}
          <table class="invoice-item-table" height="50">
            <tr>
              <td width="50">&nbsp;</td>
              <td width="500"><font size="5"><b>{{item_code}} {{chi_name}}<br>{{eng_name}}</b></font></td>
              <td width="150"><font size="5"><b>{{unit}}</b></font></td>
              <td width="120"><font size="5"><b>{{qty}}</b></font></td>
              <td width="150"><font size="5"><b>{{price}}</b></font></td>
              <td width="130"><font size="5"><b>{{subtotal}}</b></font></td>
            </tr>
          </table>
          {{/each}}
        </td>
      </tr>
    </table>

    <!-- deliver remark and invoice remark -->
    <table class="invoice-remark-table" border="0" width="1100" height="100">
      <tr valign="top">
        <td width="100%"><font size="5"><b>{{statementRemark}}</b></font></td>
      </tr>
    </table>

    <!-- print footer -->
    <table class="invoice-footer-table" border="0" width="1100">
      <tr>
        <td width="860">&nbsp;</td>
        <td><font size="5"><b>{{totalAmount}}</b></font></td>
      </tr>
    </table>

  </div>

</div>

<style>
  .invoice-print-root {
    font-family: PMingLiU, "MingLiU", serif;
    font-size: 12px;
    color: #111;
  }
  .invoice-print-page {
    width: 1100px;
    margin: 0 auto;
    padding: 0;
  }
  .invoice-header-table,
  .invoice-body-table,
  .invoice-remark-table,
  .invoice-footer-table,
  .invoice-item-table {
    border-collapse: collapse;
  }
  .invoice-page-break {
    page-break-after: always;
    margin: 0;
    padding: 0;
    height: 0;
    line-height: 0;
  }
  @media print {
    .invoice-print-page {
      width: 100%;
      max-width: 1100px;
    }
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
